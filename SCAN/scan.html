<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR Code - MobileApp</title>
    <link rel="shortcut icon" href="../SRC/IMG/logo.png" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf0 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        .scan-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .scan-header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-img {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(37,99,235,0.25);
        }

        .logo-img svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(145deg, #1e293b, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-badge {
            background: #e6f0ff;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #2563eb33;
        }

        .info-badge strong {
            color: #2563eb;
            margin-left: 0.3rem;
        }

        .user-badge {
            background: #e6f0ff;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #2563eb33;
        }

        .user-badge .avatar {
            width: 32px;
            height: 32px;
            background: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-logout:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        /* Grid layout */
        .scan-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        /* Scanner section */
        .scanner-section {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .scanner-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #2563eb;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .scanner-container {
            background: #1e293b;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 1;
            position: relative;
            margin-bottom: 1rem;
            border: 3px solid #2563eb33;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 3px solid #2563eb;
            border-radius: 10px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .scanner-instruction {
            text-align: center;
            color: #64748b;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        /* Results section */
        .results-section {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .results-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #2563eb;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #2563eb;
            border-radius: 10px;
        }

        .history-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: translateX(5px);
        }

        .history-item.success {
            border-left-color: #22c55e;
        }

        .history-item.warning {
            border-left-color: #eab308;
        }

        .history-item.error {
            border-left-color: #ef4444;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .history-agent {
            font-weight: 600;
            font-size: 1rem;
            color: #0f172a;
        }

        .history-time {
            font-size: 0.75rem;
            color: #64748b;
        }

        .history-details {
            font-size: 0.85rem;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .history-status {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-ok {
            background: #22c55e20;
            color: #16a34a;
        }

        .status-retard {
            background: #eab30820;
            color: #ca8a04;
        }

        /* Loading spinner */
        .scanning-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid #2563eb33;
            z-index: 10;
            font-size: 0.9rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #2563eb;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Alert */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 280px;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideInRight 0.3s ease;
            z-index: 1000;
            border-left: 4px solid;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .alert.success {
            border-left-color: #22c55e;
            background: #f0fdf4;
        }
        .alert.error {
            border-left-color: #ef4444;
            background: #fef2f2;
        }
        .alert.warning {
            border-left-color: #eab308;
            background: #fefce8;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Boutons de contrôle */
        .btn-controls {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 0.8rem;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(37,99,235,0.25);
        }

        .btn-secondary {
            background: transparent;
            color: #2563eb;
            border: 2px solid #2563eb;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e6f0ff;
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 0.5rem; }
            .scan-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .scan-header {
                padding: 0.8rem 1rem;
            }
            .header-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .alert {
                left: 20px;
                right: 20px;
                min-width: auto;
            }
            .btn-controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="scan-container">
        <!-- Header -->
        <div class="scan-header">
            <div class="header-info">
                <div class="logo">
                    <div class="logo-img">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                        </svg>
                    </div>
                    <span class="logo-text">Scan QR</span>
                </div>
                <div class="info-badge">
                    <span>🏪</span>
                    <span>Shop: <strong id="shopName">Chargement...</strong></span>
                </div>
                <div class="info-badge">
                    <span>⏰</span>
                    <span>Heure limite: <strong id="heureLimite">07:30</strong></span>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div class="user-badge" id="userBadge">
                    <span class="avatar" id="userAvatar">👤</span>
                    <span id="userName">Chargement...</span>
                </div>
                <button class="btn-logout" id="logoutBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.59L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                    </svg>
                    Déconnexion
                </button>
            </div>
        </div>

        <!-- Grid principal -->
        <div class="scan-grid">
            <!-- Section scanner -->
            <div class="scanner-section">
                <div class="scanner-title">
                    <span>📷</span>
                    Scanner QR Code
                </div>
                <div class="scanner-container">
                    <video id="video" autoplay playsinline></video>
                    <div class="scanner-overlay"></div>
                    <div id="scanningIndicator" class="scanning-indicator" style="display: none;">
                        <div class="spinner"></div>
                        <span>Scan en cours...</span>
                    </div>
                </div>
                <div class="scanner-instruction">
                    Placez le QR code de l'agent dans le cadre
                </div>
                <div class="btn-controls">
                    <button id="startScanBtn" class="btn-primary">▶ Démarrer scan</button>
                    <button id="stopScanBtn" class="btn-secondary">⏹ Arrêter</button>
                </div>
            </div>

            <!-- Section résultats -->
            <div class="results-section">
                <div class="results-title">
                    <span>📋</span>
                    Historique des scans
                </div>
                <div id="historyList" class="history-list">
                    <div style="text-align: center; color: #64748b; padding: 2rem;">
                        Aucun scan pour le moment
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="scanner.js"></script>
</body>
</html>
