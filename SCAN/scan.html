<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan QR Code - MobileApp</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf0 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .scan-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .scan-header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .info-badge {
            background: #e6f0ff;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-badge strong {
            color: #2563eb;
        }

        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        /* Grid layout */
        .scan-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        /* Scanner section */
        .scanner-section {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .scanner-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #2563eb;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .scanner-container {
            background: #1e293b;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 1;
            position: relative;
            margin-bottom: 1.5rem;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid #2563eb;
            border-radius: 20px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .scanner-instruction {
            text-align: center;
            color: #64748b;
            margin-bottom: 1rem;
        }

        /* Results section */
        .results-section {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .results-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #2563eb;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .history-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }

        .history-item.success {
            border-left-color: #22c55e;
        }

        .history-item.warning {
            border-left-color: #eab308;
        }

        .history-item.error {
            border-left-color: #ef4444;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .history-agent {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .history-time {
            font-size: 0.85rem;
            color: #64748b;
        }

        .history-details {
            font-size: 0.95rem;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .history-status {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-ok {
            background: #22c55e20;
            color: #16a34a;
        }

        .status-retard {
            background: #eab30820;
            color: #ca8a04;
        }

        /* Loading spinner */
        .scanning-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.9);
            padding: 1rem 2rem;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #2563eb;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Alert */
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 300px;
            padding: 1rem;
            border-radius: 12px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: slideInRight 0.3s ease;
            z-index: 1000;
        }

        .alert.success { border-left: 4px solid #22c55e; }
        .alert.error { border-left: 4px solid #ef4444; }
        .alert.warning { border-left: 4px solid #eab308; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .scan-grid {
                grid-template-columns: 1fr;
            }
            .header-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .alert {
                left: 20px;
                right: 20px;
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="scan-container">
        <!-- Header -->
        <div class="scan-header">
            <div class="header-info">
                <div class="logo" style="display: flex; align-items: center; gap: 0.5rem;">
                    <div class="logo-img" style="width: 40px; height: 40px;">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
                        </svg>
                    </div>
                    <span class="logo-text">Scan QR</span>
                </div>
                <div class="info-badge">
                    <span>🏪</span>
                    <span>Shop: <strong id="shopName">Chargement...</strong></span>
                </div>
                <div class="info-badge">
                    <span>⏰</span>
                    <span>Heure limite: <strong id="heureLimite">07:30</strong></span>
                </div>
            </div>
            <button class="btn-logout" id="logoutBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.59L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                </svg>
                Déconnexion
            </button>
        </div>

        <!-- Grid principal -->
        <div class="scan-grid">
            <!-- Section scanner -->
            <div class="scanner-section">
                <div class="scanner-title">
                    <span>📷</span>
                    Scanner QR Code
                </div>
                <div class="scanner-container">
                    <video id="video" autoplay playsinline></video>
                    <div class="scanner-overlay"></div>
                    <div id="scanningIndicator" class="scanning-indicator" style="display: none;">
                        <div class="spinner"></div>
                        <span>Scan en cours...</span>
                    </div>
                </div>
                <div class="scanner-instruction">
                    Placez le QR code de l'agent dans le cadre
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button id="startScanBtn" class="btn-primary" style="flex: 1;">▶ Démarrer scan</button>
                    <button id="stopScanBtn" class="btn-secondary" style="flex: 1;">⏹ Arrêter</button>
                </div>
            </div>

            <!-- Section résultats -->
            <div class="results-section">
                <div class="results-title">
                    <span>📋</span>
                    Historique des scans
                </div>
                <div id="historyList" class="history-list">
                    <div style="text-align: center; color: #64748b; padding: 2rem;">
                        Aucun scan pour le moment
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="scanner.js"></script>
</body>
</html>
