<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./SRC/IMG/logo.png" type="image/x-icon">
    <title>Connexion - MobileApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf0 100%);
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header avec nav */
        header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.7);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 600px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-img {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #e00482, #7c3aed);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(37,99,235,0.25);
        }

        .logo-img svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(145deg, #1e293b, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Navigation */
        .nav-menu {
            display: flex;
            gap: 1rem;
        }

        .nav-link {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: #f1f5f9;
            color: #e00482;
        }

        .nav-link.active {
            background: #e00482;
            color: white;
        }

        /* Main */
        main {
            flex: 1;
            padding: 1.5rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
        }

        .section-card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 1.8rem;
            width: 100%;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-bottom: 3px solid rgba(37,99,235,0.2);
            padding-bottom: 0.5rem;
        }

        .section-title span {
            background: #e00482;
            color: white;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .status-message {
            background: #f1f5f9;
            border-left: 4px solid #e00482;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .status-on { color: #16a34a; font-weight: 600; }
        .status-off { color: #dc2626; font-weight: 600; }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e00482;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #e00482, #7c3aed);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37,99,235,0.3);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            animation: slideIn 0.3s ease;
        }

        .alert-error {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #b91c1c;
        }

        .alert-success {
            background: #dcfce7;
            border-left: 4px solid #22c55e;
            color: #166534;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        a{
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
           <div class="logo">
                <img src="./SRC/IMG/logo.png " width="50px">
                <span class="logo-text">MobileApp</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Accueil</a>
                <a href="connexion.html" class="nav-link active">Connexion</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="section-card">
            <h2 class="section-title"><span>🔐</span> Connexion</h2>
            
            <div id="statusContainer" class="status-message">
                <span id="statusText">Vérification...</span>
            </div>

            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">Se connecter</button>
            </form>
        </section>
    </main>

    <script>
        // Gestionnaire de session unifié
        const SessionManager = {
            set(key, value) {
                localStorage.setItem(key, JSON.stringify(value));
                sessionStorage.setItem(key, JSON.stringify(value));
            },
            
            get(key) {
                let value = localStorage.getItem(key);
                if (!value) value = sessionStorage.getItem(key);
                return value ? JSON.parse(value) : null;
            },
            
            clear() {
                localStorage.clear();
                sessionStorage.clear();
            },
            
            isLoggedIn() {
                return this.get('is_logged_in') === true && this.get('user') !== null;
            }
        };

        // Vérifier redirection
        if (SessionManager.isLoggedIn()) {
            window.location.replace('agent.html');
        }

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const alertContainer = document.getElementById('alertContainer');
        const statusContainer = document.getElementById('statusContainer');
        const statusText = document.getElementById('statusText');

        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
            setTimeout(() => alertContainer.innerHTML = '', 5000);
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            submitBtn.textContent = isLoading ? 'Connexion...' : 'Se connecter';
        }

        // Vérifier statut
        fetch('API/connexion/login.php?action=check_status')
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const isOn = data.login_status === 'ON';
                    statusText.innerHTML = isOn ? 
                        '<span class="status-on">✅ Système ouvert</span>' : 
                        '<span class="status-off">⏰ Système fermé</span>';
                    
                    emailInput.disabled = !isOn;
                    passwordInput.disabled = !isOn;
                    submitBtn.disabled = !isOn;
                    
                    if (!isOn) {
                        showAlert('Système fermé - Connexions de 18h à 5h', 'error');
                    }
                }
            })
            .catch(() => {
                statusText.textContent = '⚠️ Erreur de connexion';
            });

        // Login
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            setLoading(true);

            const formData = new FormData();
            formData.append('email', emailInput.value);
            formData.append('password', passwordInput.value);

            fetch('API/connexion/login.php', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        SessionManager.set('user', data.user);
                        SessionManager.set('is_logged_in', true);
                        
                        showAlert('Connexion réussie !', 'success');
                        
                        setTimeout(() => {
                            window.location.replace('agent.html');
                        }, 1000);
                    } else {
                        showAlert(data.message || 'Erreur', 'error');
                        setLoading(false);
                    }
                })
                .catch(() => {
                    showAlert('Erreur serveur', 'error');
                    setLoading(false);
                });
        });
    </script>
</body>
</html>
